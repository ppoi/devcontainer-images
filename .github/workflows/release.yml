name: "Release DevContainers Images"

on:
  push:
    tags:
      - "*"

jobs:
  build-base-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Collect metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          tags: type=ref,event=tag
      - name: Build base image
        id: base
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/Containerfile
          tags: ghcr.io/${{github.actor}}/devcontainer-images/base:${{steps.meta.outputs.version}},ghcr.io/${{github.actor}}/devcontainer-images/base:latest
          labels: ${{ steps.meta.outputs.labels }}
          push: true
      - name: Delete old packges(base)
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'devcontainer-images/base'
          package-type: 'container'
          min-versions-to-keep: 12
      - name: Build Type-ALPHA image
        id: type-alpha
        uses: docker/build-push-action@v5
        with:
          context: ./src/type-alpha
          file: ./src/type-alpha/Containerfile
          build-args: |
            BASE_ID=${{steps.meta.outputs.version}}
          tags: ghcr.io/${{github.actor}}/devcontainer-images/type-alpha:${{steps.meta.outputs.version}},ghcr.io/${{github.actor}}/devcontainer-images/type-alpha:latest
          labels: ${{ steps.meta.outputs.labels }}
          push: true
      - name: Delete old packges(Type-ALPHA)
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'devcontainer-images/type-alpha'
          package-type: 'container'
          min-versions-to-keep: 12
      - name: Build Type-BRAVO image(JDK21)
        id: type-bravo
        uses: docker/build-push-action@v5
        with:
          context: ./src/type-bravo
          file: ./src/type-bravo/Containerfile
          build-args: |
            BASE_ID=${{steps.meta.outputs.version}}
          tags: ghcr.io/${{github.actor}}/devcontainer-images/type-bravo:${{steps.meta.outputs.version}},ghcr.io/${{github.actor}}/devcontainer-images/type-bravo:latest
          labels: ${{ steps.meta.outputs.labels }}
          push: true
      - name: Build Type-BRAVO image(JDK25)
        id: type-bravo-25
        uses: docker/build-push-action@v5
        with:
          context: ./src/type-bravo
          file: ./src/type-bravo/Containerfile
          build-args: |
            BASE_ID=${{steps.meta.outputs.version}}
            JAVA_VERSION=25
          tags: ghcr.io/${{github.actor}}/devcontainer-images/type-bravo:25-${{steps.meta.outputs.version}},ghcr.io/${{github.actor}}/devcontainer-images/type-bravo:25-latest
          labels: ${{ steps.meta.outputs.labels }}
          push: true
      - name: Delete old packges(Type-BRAVO)
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'devcontainer-images/type-bravo'
          package-type: 'container'
          min-versions-to-keep: 12
      - name: Build Type-CHARLIE image(JDK21)
        id: type-charlie
        uses: docker/build-push-action@v5
        with:
          context: ./src/type-charlie
          file: ./src/type-charlie/Containerfile
          build-args: |
            BASE_ID=${{steps.meta.outputs.version}}
          tags: ghcr.io/${{github.actor}}/devcontainer-images/type-charlie:${{steps.meta.outputs.version}},ghcr.io/${{github.actor}}/devcontainer-images/type-charlie:latest
          labels: ${{ steps.meta.outputs.labels }}
          push: true
      - name: Build Type-CHARLIE image(JDK25)
        id: type-charlie-25
        uses: docker/build-push-action@v5
        with:
          context: ./src/type-charlie
          file: ./src/type-charlie/Containerfile
          build-args: |
            BASE_ID=${{steps.meta.outputs.version}}
            JAVA_VERSION=25
          tags: ghcr.io/${{github.actor}}/devcontainer-images/type-charlie:25-${{steps.meta.outputs.version}},ghcr.io/${{github.actor}}/devcontainer-images/type-charlie:25-latest
          labels: ${{ steps.meta.outputs.labels }}
          push: true
      - name: Delete old packges(Type-CHARLIE)
        uses: actions/delete-package-versions@v5
        with:
          package-name: 'devcontainer-images/type-charlie'
          package-type: 'container'
          min-versions-to-keep: 12
